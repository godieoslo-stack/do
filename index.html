// ============================================================
// DATE UTILS — pure local arithmetic, zero UTC drift
// ============================================================
function localDate(dateStr) {
  // "YYYY-MM-DD" → local Date, never goes through UTC
  const [y,m,d] = dateStr.split("-").map(Number);
  return new Date(y, m-1, d);
}
function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function addDays(s, n) {
  const d = localDate(s);
  d.setDate(d.getDate() + n);
  return dateStr(d);
}
function todayStr() {
  return dateStr(new Date());
}
function fmtDate(s) {
  return localDate(s).toLocaleDateString("es-CO", { day:"2-digit", month:"short" });
}
function fmtMonth(ym) {
  // ym = "YYYY-MM"
  const [y,m] = ym.split("-").map(Number);
  return new Date(y, m-1, 1).toLocaleDateString("es-CO", { month:"short", year:"2-digit" });
}

// ============================================================
// PERIOD ENGINE
// ============================================================
// anchorDate = the END date of the last completed settlement period.
// Every period going forward is [anchor+1 .. anchor+interval].
// Going backward from anchor we build historical periods.
function buildPeriods(anchorDate, intervalDays) {
  const today = todayStr();
  const periods = [];

  // ── backward from anchor ──
  // each backward period ends the day before the previous one's start
  let bEnd = anchorDate;
  for (let i = 0; i < 80; i++) {           // max ~3 years back at 14-day intervals
    const bStart = addDays(bEnd, -(intervalDays - 1));
    periods.unshift({ start:bStart, end:bEnd,
      label:`${fmtDate(bStart)} – ${fmtDate(bEnd)}`, key:bStart });
    bEnd = addDays(bStart, -1);
    if (bStart < "2024-01-01") break;        // stop when far enough back
  }

  // ── forward from anchor ──
  let fStart = addDays(anchorDate, 1);
  for (let i = 0; i < 20; i++) {
    const fEnd = addDays(fStart, intervalDays - 1);
    periods.push({ start:fStart, end:fEnd,
      label:`${fmtDate(fStart)} – ${fmtDate(fEnd)}`, key:fStart });
    if (fStart > today && i >= 1) break;     // 1 future period then stop
    fStart = addDays(fEnd, 1);
  }

  return periods;
}

function getCurrentPeriod(anchorDate, intervalDays) {
  const today = todayStr();
  const periods = buildPeriods(anchorDate, intervalDays);
  return (
    periods.find(p => today >= p.start && today <= p.end) ||
    [...periods].reverse().find(p => p.end <= today) ||
    periods[0]
  );
}

function getPeriodEntries(entries, period) {
  // Only gastos count for settlement
  return entries.filter(e =>
    e.type === "gasto" &&
    e.entry_date >= period.start &&
    e.entry_date <= period.end
  );
}

// ============================================================
// SETTLEMENT ENGINE
// ============================================================
// All gastos split 50/50. Balance = what you paid - your share.
// Positive balance = overpaid = others owe you.
function calcSettlement(periodGastos) {
  const total = periodGastos.reduce((s,e) => s+e.amount, 0);
  const share = total / 2;

  let dPaid = 0, kPaid = 0;
  periodGastos.forEach(e => {
    if      (e.person === "Compartido") { dPaid += e.amount/2; kPaid += e.amount/2; }
    else if (e.person === "Diego")      { dPaid += e.amount; }
    else                                { kPaid += e.amount; }
  });

  const dBal = dPaid - share;
  const kBal = kPaid - share;
  let owes = null;
  if (Math.abs(dBal) > 0.5) {
    owes = dBal > 0
      ? { from:"Kelly", to:"Diego", amount: parseFloat(Math.abs(dBal).toFixed(2)) }
      : { from:"Diego", to:"Kelly", amount: parseFloat(Math.abs(dBal).toFixed(2)) };
  }
  return { total, share, dPaid, kPaid, dBal, kBal, owes };
}

    .pch{flex-shrink:0;cursor:pointer;padding:9px 13px;border-radius:12px;min-width:140px;transition:all .15s}

    .div{height:1px;background:var(--bd);margin:10px 0}
    select.fi option{background:#1a1e2e}
  `;
